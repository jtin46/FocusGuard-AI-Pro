<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FocusGuard AI | Pro Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="stats-bar">
            <div class="stat-item">
                <span class="label">SESSION TIME</span>
                <span id="timer" class="value">00:00</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="label">ALERTS</span>
                <span id="alert-count" class="value">0</span>
            </div>
        </div>

        <header>
            <h1>FOCUSGUARD <span class="badge">PRO</span></h1>
            <p id="status">INITIALIZING NEURAL NETWORK...</p>
        </header>

        <div class="video-parent">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="scan-line" class="hidden"></div>
        </div>

        <div class="controls">
            <button id="start-btn">Start Session</button>
            <button id="stop-btn" class="hidden">End Session</button>
        </div>
    </div>

    <audio id="alert-audio" src="assets/alert.mp3" loop></audio>

</body>
</html>
